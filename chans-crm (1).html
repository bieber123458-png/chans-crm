<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#FAF8F5;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
#app{height:100%;display:flex;flex-direction:column}
input,select,button{font-family:inherit;-webkit-appearance:none;border-radius:0;touch-action:manipulation}
input:focus,select:focus,textarea:focus{font-size:16px !important;}
::-webkit-scrollbar{display:none}
/* 滾動優化 */
.modal-body{scroll-behavior:smooth}
.modal-box{scroll-behavior:smooth;overscroll-behavior:contain}
.content{scroll-behavior:smooth;overscroll-behavior-y:contain}
/* 防止 input focus 時頁面跳動 */
input,select,textarea{font-size:16px !important}
/* 讓 modal 內容不影響背景滾動 */
body.modal-open{overflow:hidden}
button{cursor:pointer;border:none;background:none}
/* Colors */
:root{
  --brand:#C4A882;--brand-dk:#A8896A;--brand-lt:#F0E8DE;
  --bg:#FAF8F5;--surface:#fff;--warm:#F5EFE8;
  --text:#3A3330;--sub:#6B6560;--muted:#9B9390;--hint:#C4BDB9;
  --profit:#7A9E7E;--loss:#C47A7A;
  --border:#EDE8E3;--border-lt:#F5F1ED;
}
/* Layout */
.layout{display:flex;height:100%;overflow:hidden}
.hamburger{display:flex!important;min-width:44px;min-height:44px;cursor:pointer;z-index:10}
.sidebar{width:216px;flex-shrink:0;background:#fff;border-right:1px solid var(--border-lt);display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:40;transform:translateX(-100%);transition:transform .3s ease}
.sidebar.open{transform:translateX(0)}
@media(min-width:768px){.sidebar{position:static;transform:none}.hamburger{display:none!important}}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;margin-left:0}
@media(min-width:768px){.main{margin-left:216px}}
.header{background:#fff;border-bottom:1px solid var(--border-lt);padding:16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 16px}
.overlay{display:none;position:fixed;inset:0;background:rgba(20,16,14,.4);z-index:30}
.overlay.show{display:block}
/* Sidebar brand */
.brand{padding:24px 20px 16px;display:flex;align-items:center;gap:12px}
.brand-icon{width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,var(--brand),var(--brand-dk));display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand-icon svg{color:#fff}
.brand-text-main{font-size:13px;font-weight:700;letter-spacing:.12em;color:var(--text)}
.brand-text-sub{font-size:11px;letter-spacing:.06em;color:var(--muted)}
.sidebar-divider{height:1px;background:var(--border-lt);margin:0 16px 8px}
nav{flex:1;overflow-y:auto;padding:0 12px}
.nav-item{width:100%;display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:12px;margin-bottom:2px;font-size:14px;color:var(--sub);background:none;text-align:left;transition:all .15s}
.nav-item.active{background:var(--brand-lt);color:var(--brand-dk);font-weight:600}
.nav-item svg{flex-shrink:0}
.nav-dot{width:4px;height:4px;border-radius:50%;background:var(--brand);margin-left:auto}
.user-area{padding:12px 16px 20px;border-top:1px solid var(--border-lt)}
.user-avatar{width:32px;height:32px;border-radius:50%;background:var(--brand-lt);color:var(--brand-dk);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
/* Card */
.card{background:#fff;border-radius:16px;border:1px solid var(--border-lt);box-shadow:0 1px 3px rgba(58,51,48,.07),0 1px 2px rgba(58,51,48,.04)}
/* KPI card */
.kpi-card{background:#fff;border-radius:16px;border:1px solid var(--border-lt);box-shadow:0 1px 3px rgba(58,51,48,.07);padding:16px;position:relative;overflow:hidden}
.kpi-bar{position:absolute;left:0;top:12px;bottom:12px;width:3px;border-radius:0 2px 2px 0}
.kpi-label{font-size:11px;font-weight:500;color:var(--muted);letter-spacing:.03em}
.kpi-value{font-size:20px;font-weight:700;color:var(--text);margin-top:4px;letter-spacing:-.02em}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:4px}
/* Grid */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
/* Chips */
.chip{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:500;background:var(--brand-lt);color:var(--brand-dk)}
.chip-profit{background:#EDF5EE;color:var(--profit)}
.chip-loss{background:#FBEAEA;color:var(--loss)}
.chip-muted{background:var(--warm);color:var(--muted)}
/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 16px;border-radius:12px;font-size:14px;font-weight:500;transition:all .15s;border:none;cursor:pointer}
.btn-primary{background:var(--brand);color:#fff}
.btn-secondary{background:var(--warm);color:var(--sub);border:1px solid var(--border)}
.btn-danger{background:#F0D8D8;color:var(--loss)}
.btn-sm{padding:6px 12px;font-size:12px;gap:4px;border-radius:10px}
.btn-grad{background:linear-gradient(135deg,var(--brand),var(--brand-dk));color:#fff}
/* Input */
.inp-wrap{margin-bottom:12px}
.inp-label{display:block;font-size:12px;font-weight:500;color:var(--sub);margin-bottom:6px}
.inp{width:100%;padding:10px 14px;font-size:14px;border-radius:12px;border:1px solid var(--border);background:#fff;color:var(--text);outline:none;-webkit-appearance:none}
.inp:focus{border-color:var(--brand)}
select.inp{appearance:none;-webkit-appearance:none}
.inp[readonly]{background:var(--warm)}
/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(20,16,14,.45);z-index:50;display:flex;align-items:flex-end;justify-content:center}
@media(min-width:768px){.modal-bg{align-items:center}}
.modal-box{background:#fff;width:100%;max-width:512px;border-radius:24px 24px 0 0;max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
@media(min-width:768px){.modal-box{border-radius:16px}}
.modal-handle{display:flex;justify-content:center;padding:12px 0 4px}
.modal-handle-bar{width:32px;height:4px;border-radius:4px;background:var(--border)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border-lt)}
.modal-title{font-size:15px;font-weight:600;color:var(--text)}
.modal-close{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--muted);background:none;border:none;cursor:pointer}
.modal-body{padding:20px}
/* Tabs */
.tabs{display:flex;gap:8px;margin-bottom:16px}
.tab{flex:1;padding:6px;border-radius:12px;font-size:13px;font-weight:500;border:none;cursor:pointer;transition:all .15s;background:var(--warm);color:var(--sub)}
.tab.active{background:var(--brand);color:#fff}
/* Month nav */
.month-nav{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.month-btn{width:32px;height:32px;border-radius:10px;background:var(--warm);color:var(--sub);display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;flex-shrink:0}
.month-label{flex:1;text-align:center;font-size:15px;font-weight:600;color:var(--text)}
/* Section */
.section{border-radius:16px;overflow:hidden;margin-bottom:16px;border:1px solid var(--border-lt)}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border-lt)}
.section-body{padding:16px}
/* Summary card */
.summary-card{border-radius:16px;overflow:hidden;margin-bottom:16px;border:2px solid var(--brand)}
.summary-header{padding:10px 16px;background:linear-gradient(135deg,var(--brand),var(--brand-dk))}
.summary-header span{font-size:12px;font-weight:700;color:#fff;letter-spacing:.05em}
.summary-row{display:flex;justify-content:space-between;align-items:center;font-size:14px;margin-bottom:8px}
.summary-row:last-child{margin-bottom:0}
.summary-divider{border:none;border-top:1px solid var(--border-lt);margin:8px 0}
/* Order items */
.item-box{background:var(--warm);border-radius:12px;padding:12px;margin-bottom:8px}
/* Progress bar */
.pbar-wrap{margin-bottom:4px}
.pbar-top{display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px}
.pbar-track{height:6px;border-radius:99px;background:var(--brand-lt);overflow:hidden}
.pbar-fill{height:100%;border-radius:99px;transition:width .5s ease}
.pbar-bottom{display:flex;justify-content:space-between;font-size:11px;color:var(--hint);margin-top:4px}
/* Month group toggle */
.month-group-btn{width:100%;display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-radius:16px;border:none;cursor:pointer;transition:all .15s;margin-bottom:4px}
/* Accordion body */
.accordion-body{margin-top:8px}
/* Confirm modal danger */
.confirm-msg{font-size:14px;line-height:1.8;color:var(--sub);margin-bottom:20px;white-space:pre-line}
/* Misc */
.space-y-2>*+*{margin-top:8px}
.space-y-3>*+*{margin-top:12px}
.space-y-4>*+*{margin-top:16px}
.flex{display:flex}.flex-1{flex:1 1 0}.gap-2{gap:8px}.gap-3{gap:12px}
.items-center{align-items:center}.items-start{align-items:flex-start}
.justify-between{justify-content:space-between}
.font-bold{font-weight:700}.font-semibold{font-weight:600}.font-medium{font-weight:500}
.text-xs{font-size:12px}.text-sm{font-size:14px}.text-lg{font-size:18px}.text-xl{font-size:20px}.text-2xl{font-size:24px}
.text-center{text-align:center}.text-right{text-align:right}
.min-w-0{min-width:0}.flex-wrap{flex-wrap:wrap}.flex-shrink-0{flex-shrink:0}
.overflow-x-auto{overflow-x:auto}
.mt-1{margin-top:4px}.mt-2{margin-top:8px}.mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}.ml-auto{margin-left:auto}
.p-3{padding:12px}.p-4{padding:16px}.p-8{padding:32px}
.w-full{width:100%}
.rounded-full{border-radius:99px}.rounded-xl{border-radius:12px}.rounded-2xl{border-radius:16px}
.border-t{border-top:1px solid}
</style>
</head>

function calcOrder(o){
  const items=o.items||[{name:o.product||'',qty:o.qty||1,price:o.price||0,cost:o.cost||0}];
  const revenue=items.reduce((s,i)=>s+(+i.qty||0)*(+i.price||0),0);
  const prodCost=items.reduce((s,i)=>s+(+i.qty||0)*(+i.cost||0),0);
  const bossGifts=o.bossGifts||[];
  const bossGiftRevenue=bossGifts.reduce((s,g)=>s+(+g.qty||0)*(+g.price||0),0);
  const ex=o.expenses||{shipping:0,packaging:0,commission:0,discount:0,other:0};
  const totalExp=(+ex.shipping||0)+(+ex.packaging||0)+(+ex.commission||0)+(+ex.discount||0)+(+ex.other||0);
  const orderProfit=revenue-prodCost-totalExp;
  const totalProfit=orderProfit+bossGiftRevenue;
  return{...o,items,bossGifts,expenses:ex,revenue,prodCost,bossGiftRevenue,totalExp,orderProfit,totalProfit,total:revenue,profit:orderProfit,profitRate:revenue?Math.round(orderProfit/revenue*100):0};
}

// ── 渲染引擎 ───────────────────────────────────────────────────
function h(tag,attrs={},children=''){
  const a=Object.entries(attrs).map(([k,v])=>{
    if(k==='style'&&typeof v==='object') return `style="${Object.entries(v).map(([p,val])=>`${p.replace(/([A-Z])/g,'-$1').toLowerCase()}:${val}`).join(';')}"`;
    if(k==='class') return `class="${v}"`;
    if(k.startsWith('on')) return '';
    return `${k}="${v}"`;
  }).join(' ');
  const c=Array.isArray(children)?children.join(''):children;
  return `<${tag}${a?' '+a:''}>${c}</${tag}>`;
}

}

  return `<div class="modal-bg" id="modal-overlay" onclick="handleModalBgClick(event)"><div class="modal-box"><div class="modal-handle"><div class="modal-handle-bar"></div></div><div class="modal-header"><span class="modal-title">${title}</span><button class="modal-close" onclick="closeModal()">${svg(ICONS.x,15)}</button></div><div class="modal-body">${content}</div></div></div>`;
}
function inp(label,id,type='text',value='',extra=''){
  return `<div class="inp-wrap"><label class="inp-label">${label}</label><input class="inp" type="${type}" id="${id}" value="${esc(value)}" ${extra} oninput="onInpChange('${id}',this.value)"></div>`;
}
function sel(label,id,options,value=''){
  const opts=options.map(o=>`<option value="${o}" ${o===value?'selected':''}>${o}</option>`).join('');
  return `<div class="inp-wrap"><label class="inp-label">${label}</label><select class="inp" id="${id}" onchange="onSelChange('${id}',this.value)">${opts}</select></div>`;
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── 計算輔助 ───────────────────────────────────────────────────
function moData(orders,vm){
  const mo=orders.filter(o=>o.date.startsWith(vm));
  const sales=mo.reduce((s,o)=>s+(o.revenue||o.total||0),0);
  const profit=mo.reduce((s,o)=>s+(o.orderProfit||o.profit||0),0);
  const boss=mo.reduce((s,o)=>s+(o.bossGiftRevenue||0),0);
  return{mo,sales,profit,boss,count:mo.length};
}

function calcForm(){
  const revenue=FORM.items.reduce((s,i)=>s+(+i.qty||0)*(+i.price||0),0);
  const prodCost=FORM.items.reduce((s,i)=>s+(+i.qty||0)*(+i.cost||0),0);
  const bgRev=FORM.bossGifts.reduce((s,g)=>s+(+g.qty||0)*(+g.price||0),0);
  const ex=FORM.expenses;
  const totalExp=(+ex.shipping||0)+(+ex.packaging||0)+(+ex.commission||0)+(+ex.discount||0)+(+ex.other||0);
  const orderProfit=revenue-prodCost-totalExp;
  return{revenue,prodCost,bgRev,totalExp,orderProfit,totalProfit:orderProfit+bgRev};
}

    `<div class="inp-wrap"><label class="inp-label">電話</label><input class="inp" type="tel" placeholder="選填" value="${esc(FORM.contact||'')}" oninput="FORM.contact=this.value"></div>`+
    `<div class="inp-wrap"><label class="inp-label">來源 / 級別</label><div class="flex flex-wrap gap-2">${ORDER_SOURCES.map(s=>`<button onclick="setFormSource('${s}')" style="padding:6px 12px;border-radius:10px;font-size:12px;font-weight:500;border:1px solid ${FORM.source===s?C.brand:C.border};background:${FORM.source===s?C.brandLt:'#fff'};color:${FORM.source===s?C.brandDk:C.muted};cursor:pointer">${s}</button>`).join('')}</div></div>`+
    `<div class="inp-wrap"><label class="inp-label">出貨方式</label><div class="flex flex-wrap gap-2">${SHIPPING_OPTS.map(s=>`<button onclick="setFormShipping('${s}')" style="padding:8px 12px;border-radius:10px;font-size:13px;font-weight:500;border:1px solid ${FORM.shipping===s?C.brand:C.border};background:${FORM.shipping===s?C.brandLt:'#fff'};color:${FORM.shipping===s?C.brandDk:C.muted};cursor:pointer">${s}</button>`).join('')}</div></div>`+
    `<div class="inp-wrap" style="margin-bottom:0"><label class="inp-label">付款方式</label><div class="grid2">${PAYMENT_OPTS.map(p=>`<button onclick="FORM.payment='${p}';renderModal()" style="padding:8px;border-radius:10px;font-size:12px;font-weight:500;border:1px solid ${FORM.payment===p?C.brand:C.border};background:${FORM.payment===p?C.brandLt:'#fff'};color:${FORM.payment===p?C.brandDk:C.muted};cursor:pointer">${p}</button>`).join('')}</div></div>`
  );

  // B+C 商品
  const secBC=section('B + C  主購 & VIP加購商品',
    `<div class="space-y-3">${FORM.items.map((item,i)=>`<div class="item-box"><div class="flex gap-2" style="margin-bottom:8px">${prodSelect(item.name,`updateItem(${i},'name',this.value)`)}${FORM.items.length>1?`<button onclick="removeItem(${i})" style="width:28px;height:28px;border-radius:50%;background:#F0D8D8;color:var(--loss);border:none;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center">${svg(ICONS.x,12)}</button>`:''}</div><div class="grid3"><div><label class="inp-label">數量</label><input class="inp" type="number" min="1" value="${item.qty}" oninput="updateItem(${i},'qty',this.value)"></div><div><label class="inp-label">售價</label><input class="inp" type="number" value="${item.price}" oninput="updateItem(${i},'price',this.value)"></div><div><label class="inp-label">成本</label><input class="inp" type="number" value="${item.cost}" readonly style="background:var(--warm)"></div></div><p style="font-size:12px;color:var(--muted);margin-top:6px">小計 <strong style="color:var(--text)">${fmt((+item.qty||0)*(+item.price||0))}</strong> · 成本 ${fmt((+item.qty||0)*(+item.cost||0))}</p></div>`).join('')}<button onclick="addItem()" class="btn btn-secondary btn-sm w-full" style="margin-top:4px">${svg(ICONS.plus,12)} 加商品</button></div>`,
    '#7A9E7E'
  );

  // E 老闆搭贈
  const secE=section('E  老闆活動搭贈（成本$0，計搭贈收益）',
    FORM.bossGifts.length===0?`<p style="font-size:12px;text-align:center;padding:8px;color:var(--hint)">老闆搭贈給我賣出去的商品，純收益</p>`:
    `<div class="space-y-2">${FORM.bossGifts.map((g,i)=>`<div class="item-box" style="background:#F7F5FF"><div class="flex gap-2" style="margin-bottom:8px">${prodSelect(g.name,`updateBossGift(${i},'name',this.value)`)}<button onclick="removeBossGift(${i})" style="width:28px;height:28px;border-radius:50%;background:#F0D8D8;color:var(--loss);border:none;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center">${svg(ICONS.x,12)}</button></div><div class="grid2"><div><label class="inp-label">數量</label><input class="inp" type="number" min="1" value="${g.qty}" oninput="updateBossGift(${i},'qty',this.value)"></div><div><label class="inp-label">我的售價</label><input class="inp" type="number" value="${g.price}" oninput="updateBossGift(${i},'price',this.value)"></div></div><p style="font-size:12px;color:#9088B8;margin-top:6px">搭贈收益 <strong>${fmt((+g.qty||0)*(+g.price||0))}</strong>（成本$0）</p></div>`).join('')}</div>`,
    '#9088B8',`<button onclick="addBossGift()" style="display:flex;align-items:center;gap:4px;font-size:12px;font-weight:500;padding:4px 8px;border-radius:8px;background:#F0EEF7;color:#9088B8;border:none;cursor:pointer">${svg(ICONS.plus,11)} 新增搭贈</button>`
  );

  // F 訂單支出
  const secF=section('F  訂單支出',
    `<div class="grid2">${[['shipping','運費（自動）'],['packaging','包材費'],['commission','手續費/利息'],['discount','折扣'],['other','其他支出']].map(([k,l])=>`<div><label class="inp-label">${l}</label><input class="inp" type="number" value="${FORM.expenses[k]||0}" oninput="FORM.expenses['${k}']=this.value;updateSummary()"></div>`).join('')}</div>`,
    C.loss
  );

  // G 總結
  const secG=`<div class="summary-card"><div class="summary-header"><span>G  訂單總結（即時）</span></div><div class="section-body"><div class="summary-row"><span style="color:var(--sub)">客人付款</span><strong style="color:var(--text)">${fmt(revenue)}</strong></div><div class="summary-row"><span style="color:var(--sub)">商品成本</span><span style="color:var(--loss)">－${fmt(prodCost)}</span></div>${totalExp>0?`<div class="summary-row"><span style="color:var(--sub)">訂單支出</span><span style="color:var(--loss)">－${fmt(totalExp)}</span></div>`:''}<hr class="summary-divider"><div class="summary-row"><span style="font-weight:600;color:var(--text)">訂單淨利</span><span style="font-weight:600;color:${orderProfit>=0?C.profit:C.loss}">${fmt(orderProfit)}</span></div>${bgRev>0?`<div class="summary-row"><span style="color:#9088B8">老闆搭贈收益</span><span style="color:#9088B8">＋${fmt(bgRev)}</span></div><hr class="summary-divider"><div class="summary-row" style="font-size:16px;font-weight:700"><span style="color:var(--text)">總淨利</span><span style="color:${totalProfit>=0?C.profit:C.loss}">${fmt(totalProfit)}</span></div>`:''}</div></div>`;

  const noteInp=`<div class="inp-wrap"><label class="inp-label">備註</label><input class="inp" type="text" placeholder="選填" value="${esc(FORM.note||'')}" oninput="FORM.note=this.value"></div>`;
  const btns=`<div class="flex gap-2"><button onclick="saveOrderForm()" class="btn btn-grad" style="flex:1;padding:12px">儲存訂單</button><button onclick="closeModal()" class="btn btn-secondary" style="flex:1;padding:12px">取消</button></div>`;

  return `<div style="overflow-y:auto;max-height:75vh;-webkit-overflow-scrolling:touch;overscroll-behavior:contain">${secA}${secBC}${secE}${secF}${secG}${noteInp}${btns}</div>`;
}

function setFormSource(src){FORM.source=src;FORM.items=FORM.items.map(i=>({...i,price:getPrice(i.name,src)||i.price}));FORM.bossGifts=FORM.bossGifts.map(g=>({...g,price:getPrice(g.name,src)||g.price}));renderModal();}
function setFormShipping(s){FORM.shipping=s;FORM.expenses.shipping=SHIPPING_FEE[s]||0;renderModal();}
function addItem(){FORM.items.push({name:'纖纖飲',qty:1,price:getPrice('纖纖飲',FORM.source),cost:getCost('纖纖飲')});renderModal();}
function removeItem(i){FORM.items.splice(i,1);renderModal();}
function updateItem(i,k,v){FORM.items[i][k]=v;if(k==='name'){FORM.items[i].price=getPrice(v,FORM.source);FORM.items[i].cost=getCost(v);renderModal();}else{updateSummary();}}
function addBossGift(){FORM.bossGifts.push({name:'纖纖飲',qty:1,price:getPrice('纖纖飲',FORM.source),cost:0});renderModal();}
function removeBossGift(i){FORM.bossGifts.splice(i,1);renderModal();}
function updateBossGift(i,k,v){FORM.bossGifts[i][k]=v;if(k==='name'){FORM.bossGifts[i].price=getPrice(v,FORM.source);renderModal();}else{updateSummary();}}

function updateSummary(){
  try{
    const revenue=FORM.items.reduce((s,i)=>s+(+i.qty||0)*(+i.price||0),0);
    const prodCost=FORM.items.reduce((s,i)=>s+(+i.qty||0)*(+i.cost||0),0);
    const bgRev=FORM.bossGifts.reduce((s,g)=>s+(+g.qty||0)*(+g.price||0),0);
    const ex=FORM.expenses;
    const totalExp=(+ex.shipping||0)+(+ex.packaging||0)+(+ex.commission||0)+(+ex.discount||0)+(+ex.other||0);
    const orderProfit=revenue-prodCost-totalExp;
    const totalProfit=orderProfit+bgRev;
    // 更新小計文字
    FORM.items.forEach((item,i)=>{
      const el=document.querySelector(`[data-item-subtotal="${i}"]`);
      if(el)el.textContent=`小計 ${fmt((+item.qty||0)*(+item.price||0))} · 成本 ${fmt((+item.qty||0)*(+item.cost||0))}`;
    });
  }catch(e){}
}
function saveOrderForm(){
  const o=calcOrder({...FORM,id:STATE.editOrder?STATE.editOrder.id:Date.now(),trackDays:STATE.editOrder?STATE.editOrder.trackDays:[1,3,7,14,28],trackDone:STATE.editOrder?STATE.editOrder.trackDone:[]});
  if(STATE.editOrder)STATE.orders=STATE.orders.map(x=>x.id===o.id?o:x);
  else STATE.orders=[o,...STATE.orders];
  STATE.showOrderForm=false;STATE.editOrder=null;debounceSave();renderModal();renderPage();
}
function delOrder(id){STATE.ordersDelId=id;renderModal();}
function confirmDelOrder(){STATE.orders=STATE.orders.filter(o=>o.id!==STATE.ordersDelId);STATE.ordersDelId=null;debounceSave();renderModal();renderPage();}
function toggleTrack(id,day){STATE.orders=STATE.orders.map(o=>{if(o.id!==id)return o;const d=o.trackDone||[];return{...o,trackDone:d.includes(day)?d.filter(x=>x!==day):[...d,day]};});debounceSave();renderPage();}

// ── 搭贈收益 ───────────────────────────────────────────────────
function renderGifts(){
  const allBG=[];
  STATE.orders.forEach(o=>(o.bossGifts||[]).forEach(g=>allBG.push({...g,date:o.date,customer:o.customer})));
  const total=allBG.reduce((s,g)=>s+(+g.qty||0)*(+g.price||0),0);
  const mRev=allBG.filter(g=>g.date.startsWith(STATE.dashVm)).reduce((s,g)=>s+(+g.qty||0)*(+g.price||0),0);
  const prodMap={};allBG.forEach(g=>{prodMap[g.name]=(prodMap[g.name]||0)+(+g.qty||0)*(+g.price||0);});
  const prodRank=Object.entries(prodMap).sort((a,b)=>b[1]-a[1]);
  const maxV=prodRank[0]?.[1]||1;
  return `<div class="space-y-4">`+
    `<div class="grid2">${kpiCard('本月搭贈收益',fmt(mRev),'老闆活動搭贈','#9088B8')}${kpiCard('累積搭贈收益',fmt(total),'全部訂單',C.profit)}</div>`+
    card(`<p style="font-size:13px;font-weight:600;color:var(--sub);margin-bottom:8px">說明</p><p style="font-size:12px;color:var(--muted);line-height:1.8">搭贈收益 = 老闆活動搭贈給我的商品 × 我的售價<br>成本 = $0（老闆免費提供）<br>在新增記帳的「E 老闆活動搭贈」區塊中新增</p>`)+
    (prodRank.length?card(`<p style="font-size:13px;font-weight:600;color:var(--sub);margin-bottom:12px">搭贈收益排行</p><div class="space-y-3">${prodRank.map(([name,val])=>`<div><div class="flex justify-between" style="font-size:12px;margin-bottom:4px"><span style="color:var(--text)">${esc(name)}</span><span style="color:#9088B8;font-weight:600">${fmt(val)}</span></div><div style="height:8px;background:var(--warm);border-radius:4px"><div style="height:100%;width:${pct(val,maxV)}%;background:#9088B8;border-radius:4px"></div></div></div>`).join('')}</div>`):'')+
    (allBG.length?`<div class="space-y-2">${allBG.slice().sort((a,b)=>b.date.localeCompare(a.date)).map((g,i)=>`<div class="card p-3"><div class="flex justify-between items-center"><div><div class="flex items-center gap-2"><span style="font-weight:600;font-size:14px;color:var(--text)">${esc(g.customer)}</span>${chip('搭贈','muted')}</div><p style="font-size:12px;color:var(--muted);margin-top:2px">${esc(g.date)} · ${esc(g.name)} × ${g.qty}</p></div><span style="font-weight:600;color:#9088B8">${fmt((+g.qty||0)*(+g.price||0))}</span></div></div>`).join('')}</div>`:
    `<div class="card p-8 text-center"><p style="color:var(--muted)">目前沒有搭贈記錄</p></div>`)+
  `</div>`;
}

// ── 月淨利分析 ─────────────────────────────────────────────────
function renderMonthly(){
  const {orders,expenses,monthlyVm:vm}=STATE;
  const allM={};
  orders.forEach(o=>{const mo=o.date.slice(0,7);if(!allM[mo])allM[mo]={sales:0,cP:0,tP:0,gP:0,exp:0};allM[mo].sales+=o.revenue||0;const p=o.orderProfit||0,b=o.bossGiftRevenue||0;if(isTeam(o.source))allM[mo].tP+=p;else allM[mo].cP+=p;allM[mo].gP+=b;});
  expenses.forEach(e=>{const mo=e.date.slice(0,7);if(!allM[mo])allM[mo]={sales:0,cP:0,tP:0,gP:0,exp:0};allM[mo].exp+=e.amount;});
  const mv=allM[vm]||{sales:0,cP:0,tP:0,gP:0,exp:0};
  const mNet=mv.cP+mv.tP+mv.gP-mv.exp;
  const mO=orders.filter(o=>o.date.startsWith(vm));
  const prodMap={};mO.forEach(o=>(o.items||[]).forEach(i=>{prodMap[i.name]=(prodMap[i.name]||0)+(+i.qty||0)*(+i.price||0);}));
  const prodTotal=Object.values(prodMap).reduce((a,b)=>a+b,0);
  const top5=Object.entries(prodMap).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const CHART=['#C4A882','#A8BBA5','#B5ABCA','#96AFBF','#C9B4A0'];
  const monthList=Object.entries(allM).sort((a,b)=>b[0].localeCompare(a[0]));
  const mnav=`<div class="month-nav"><button class="month-btn" onclick="prevMonth('monthlyVm')">${svg(ICONS.chevLeft)}</button><span class="month-label">${vm}</span><button class="month-btn" onclick="nextMonth('monthlyVm')">${svg(ICONS.chevRight)}</button></div>`;
  return mnav+`<div class="space-y-4">`+
    `<div class="grid2">${kpiCard('客戶淨利',fmt(mv.cP),'',C.brand)}${kpiCard('團隊淨利',fmt(mv.tP),'',C.profit)}</div>`+
    `<div class="grid2">${kpiCard('搭贈收益',fmt(mv.gP),'','#9088B8')}${kpiCard('支出',fmt(mv.exp),'',C.loss)}</div>`+
    `<div class="card p-4" style="background:linear-gradient(135deg,${C.brandLt},#fff)"><div class="flex justify-between items-center"><div><p style="font-size:12px;color:var(--sub)">${vm} 月淨利</p><p style="font-size:24px;font-weight:700;color:${mNet>=0?C.profit:C.loss};margin-top:4px">${fmt(mNet)}</p></div><div style="text-align:right;font-size:12px;color:var(--muted)"><p>客戶 ${fmt(mv.cP)}</p><p>團隊 ${fmt(mv.tP)}</p><p>+搭贈 ${fmt(mv.gP)}</p><p>-支出 ${fmt(mv.exp)}</p></div></div></div>`+
    (top5.length?card(`<p style="font-size:13px;font-weight:600;color:var(--sub);margin-bottom:12px">商品 Top 5</p><div class="space-y-3">${top5.map(([name,val],i)=>`<div><div class="flex justify-between" style="font-size:12px;margin-bottom:4px"><span style="color:var(--text)">${['1.','2.','3.','4.','5.'][i]} ${esc(name)}</span><span style="color:var(--muted)">${fmt(val)} · ${prodTotal?Math.round(val/prodTotal*100):0}%</span></div><div style="height:8px;background:var(--warm);border-radius:4px"><div style="height:100%;width:${prodTotal?pct(val,prodTotal):0}%;background:${CHART[i]};border-radius:4px"></div></div></div>`).join('')}</div>`):'')+
    card(`<p style="font-size:13px;font-weight:600;color:var(--sub);margin-bottom:12px">月淨利彙整總表</p><div class="overflow-x-auto"><table style="width:100%;font-size:12px;border-collapse:collapse;min-width:320px"><thead><tr style="color:var(--muted)"><th style="text-align:left;padding:6px 4px">月份</th><th style="text-align:right;padding:6px 4px">客戶</th><th style="text-align:right;padding:6px 4px">團隊</th><th style="text-align:right;padding:6px 4px">支出</th><th style="text-align:right;padding:6px 4px;color:var(--brand-dk)">月淨利</th></tr></thead><tbody>${monthList.map(([mo,v])=>{const net=v.cP+v.tP+v.gP-v.exp,active=mo===vm;return`<tr onclick="setMonthlyVm('${mo}')" style="border-top:1px solid var(--border-lt);cursor:pointer;background:${active?C.brandLt:'transparent'}"><td style="padding:6px 4px;font-weight:600;color:${active?C.brandDk:C.text}">${mo}${active?' ◀':''}</td><td style="padding:6px 4px;text-align:right;color:var(--brand)">${fmt(v.cP)}</td><td style="padding:6px 4px;text-align:right;color:var(--profit)">${fmt(v.tP)}</td><td style="padding:6px 4px;text-align:right;color:var(--muted)">-${fmt(v.exp)}</td><td style="padding:6px 4px;text-align:right;font-weight:700;color:${net>=0?C.profit:C.loss}">${fmt(net)}</td></tr>`;}).join('')}</tbody></table></div>`)+
  `</div>`;
}

// ── Modal 渲染 ─────────────────────────────────────────────────
function renderModal(){
  let m=document.getElementById('modal-container');
  if(!m){m=document.createElement('div');m.id='modal-container';document.body.appendChild(m);}
  // 記住所有可能的滾動位置
  const modalBox=m.querySelector('.modal-box');
  const scrollTop=modalBox?modalBox.scrollTop:0;
  const innerScroll=m.querySelector('[style*="overflow-y"]');
  const innerScrollTop=innerScroll?innerScroll.scrollTop:0;
  if(STATE.showOrderForm){
    m.innerHTML=modal(STATE.editOrder?'編輯記帳':'新增記帳',renderOrderForm());
    requestAnimationFrame(()=>{
      const nb=m.querySelector('.modal-box');
      if(nb&&scrollTop>0)nb.scrollTop=scrollTop;
      const ni=m.querySelector('[style*="overflow-y"]');
      if(ni&&innerScrollTop>0)ni.scrollTop=innerScrollTop;
    });
  } else if(STATE.ordersDelId){
    m.innerHTML=modal('確認刪除',`<p class="confirm-msg">確定要刪除這筆記帳嗎？刪除後無法復原。</p><div class="flex gap-2"><button onclick="confirmDelOrder()" class="btn" style="flex:1;background:#C47A7A;color:#fff">確定刪除</button><button onclick="closeModal()" class="btn btn-secondary" style="flex:1">取消</button></div>`);
  } else if(STATE.custDelTarget){
    const {name}=STATE.custDelTarget;
    const oCnt=STATE.orders.filter(o=>o.customer===name).length;
    const bCnt=STATE.orders.filter(o=>o.customer===name).reduce((s,o)=>s+(o.bossGifts||[]).length,0);
    const eCnt=STATE.expenses.filter(e=>e.customer===name).length;
    const details=[`訂單記錄 ${oCnt} 筆（含商品、搭贈、支出明細）`,bCnt>0?`搭贈收益記錄 ${bCnt} 筆`:null,eCnt>0?`支出記錄 ${eCnt} 筆`:null,'Products Tracker 相關紀錄','Dashboard 與月淨利統計'].filter(Boolean).map(d=>`• ${d}`).join('\n');
    m.innerHTML=modal('永久刪除客戶',`<p class="confirm-msg">此操作將永久刪除「${esc(name)}」及所有相關資料：\n${details}\n\n刪除後無法復原，是否確定？</p><div class="flex gap-2"><button onclick="confirmDelCust()" class="btn" style="flex:1;background:#C47A7A;color:#fff;padding:12px;border-radius:12px;font-weight:600">確認永久刪除</button><button onclick="closeModal()" class="btn btn-secondary" style="flex:1;padding:12px;border-radius:12px">取消</button></div>`);
  } else if(STATE.showFinanceAccountModal&&STATE.editFinanceAccount){
    m.innerHTML=modal('編輯帳戶',renderFinanceAccountModal());
    requestAnimationFrame(()=>{
      const nb3=m.querySelector('.modal-box');
      if(nb3&&scrollTop>0)nb3.scrollTop=scrollTop;
    });
  } else if(STATE.showFinanceGoalModal){
    m.innerHTML=modal(STATE.editFinanceGoal?'編輯目標':'新增目標',renderFinanceGoalModal());
    requestAnimationFrame(()=>{
      const nb4=m.querySelector('.modal-box');
      if(nb4&&scrollTop>0)nb4.scrollTop=scrollTop;
    });
  } else if(STATE.financeDelGoalId){
    m.innerHTML=modal('確認刪除',`<p class="confirm-msg">確定要刪除這個目標嗎？</p><div class="flex gap-2"><button onclick="confirmDelFinanceGoal()" class="btn" style="flex:1;background:#C47A7A;color:#fff">確定刪除</button><button onclick="closeModal()" class="btn btn-secondary" style="flex:1">取消</button></div>`);
  } else if(STATE.showCustForm){
    m.innerHTML=modal(STATE.editCust?'編輯客戶':'新增客戶',renderCustForm());
    requestAnimationFrame(()=>{
      const nb2=m.querySelector('.modal-box');
      if(nb2&&scrollTop>0)nb2.scrollTop=scrollTop;
    });
  } else {
    m.innerHTML='';
  }
}

      <div class="flex justify-between items-start" style="margin-bottom:12px">
        <div class="flex items-center gap-2">
          <div style="width:10px;height:10px;border-radius:50%;background:${a.color};flex-shrink:0"></div>
          <span style="font-weight:700;font-size:16px;color:var(--text)">${esc(a.name)}</span>
        </div>
        <button onclick="openEditFinanceAccount('${a.id}')" style="font-size:12px;padding:4px 10px;border-radius:8px;border:1px solid var(--border);color:var(--sub);background:none;cursor:pointer">編輯</button>
      </div>
      <div class="grid3" style="margin-bottom:12px">
        <div><p style="font-size:11px;color:var(--muted);margin-bottom:2px">目前金額</p><p style="font-weight:700;font-size:15px;color:var(--text)">${fmt(cur)}</p></div>
        <div><p style="font-size:11px;color:var(--muted);margin-bottom:2px">每月存入</p><p style="font-weight:700;font-size:15px;color:var(--profit)">${fmt(mo)}</p></div>
        <div><p style="font-size:11px;color:var(--muted);margin-bottom:2px">目標金額</p><p style="font-weight:700;font-size:15px;color:var(--brand-dk)">${fmt(tar)}</p></div>
      </div>
      ${tar>0?`<div class="pbar-wrap">
        <div class="pbar-top"><span style="color:var(--sub);font-size:12px">進度</span><span style="color:var(--muted);font-size:12px">${p}% · 差 ${fmt(remain)}</span></div>
        <div class="pbar-track"><div class="pbar-fill" style="width:${p}%;background:${a.color}"></div></div>
        <div class="pbar-bottom"><span>${fmt(cur)}</span><span>目標 ${fmt(tar)}</span></div>
      </div>`:'<p style="font-size:12px;color:var(--hint)">尚未設定目標金額</p>'}
    </div>`;
  }).join('');

  const goalsHtml=goals.length===0
    ?`<div class="card p-8 text-center"><p style="color:var(--muted)">尚無自訂目標<br><span style="font-size:12px">點上方「新增目標」開始</span></p></div>`
    :goals.map(g=>{
      const cur=+g.current||0,tar=+g.target||0;
      const p=tar?Math.min(100,Math.round(cur/tar*100)):0;
      return `<div class="card p-4" style="margin-bottom:8px">
        <div class="flex justify-between items-start" style="margin-bottom:8px">
          <span style="font-weight:600;font-size:15px;color:var(--text)">${esc(g.name)}</span>
          <div class="flex gap-2">
            <button onclick="openEditFinanceGoal('${g.id}')" style="font-size:12px;padding:4px 8px;border-radius:8px;border:1px solid var(--border);color:var(--sub);background:none;cursor:pointer">編輯</button>
            <button onclick="delFinanceGoal('${g.id}')" style="font-size:12px;padding:4px 8px;border-radius:8px;border:1px solid #F0D8D8;color:var(--loss);background:none;cursor:pointer">刪除</button>
          </div>
        </div>
        <div class="grid2" style="margin-bottom:10px">
          <div><p style="font-size:11px;color:var(--muted);margin-bottom:2px">目前已存</p><p style="font-weight:700;font-size:14px;color:var(--profit)">${fmt(cur)}</p></div>
          <div><p style="font-size:11px;color:var(--muted);margin-bottom:2px">目標金額</p><p style="font-weight:700;font-size:14px;color:var(--brand-dk)">${fmt(tar)}</p></div>
        </div>
        <div class="pbar-track"><div class="pbar-fill" style="width:${p}%;background:var(--brand)"></div></div>
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--hint);margin-top:4px"><span>${p}%</span><span>還差 ${fmt(Math.max(0,tar-cur))}</span></div>
      </div>`;
    }).join('');

  return `<div class="space-y-4">
    <div class="card p-4" style="background:linear-gradient(135deg,var(--brand-lt),#fff)">
      <p style="font-size:12px;color:var(--sub);margin-bottom:4px">三帳戶總資產</p>
      <p style="font-size:28px;font-weight:700;color:var(--text)">${fmt(totalAsset)}</p>
      ${totalTarget>0?`<p style="font-size:12px;color:var(--muted);margin-top:4px">目標總計 ${fmt(totalTarget)} · 還差 ${fmt(Math.max(0,totalTarget-totalAsset))}</p>`:''}
    </div>
    <div>
      <p style="font-size:13px;font-weight:600;color:var(--sub);margin-bottom:12px">帳戶明細</p>
      ${accountsHtml}
    </div>
    <div>
      <div class="flex justify-between items-center" style="margin-bottom:12px">
        <p style="font-size:13px;font-weight:600;color:var(--sub)">自訂目標</p>
        <button onclick="openAddFinanceGoal()" class="btn btn-primary btn-sm">${svg(ICONS.plus,12)} 新增目標</button>
      </div>
      ${goalsHtml}
    </div>
  </div>`;
}

function openEditFinanceAccount(id){
  const a=STATE.finance.accounts.find(x=>x.id===id);
  if(!a)return;
  STATE.editFinanceAccount=a;
  FINANCE_ACCOUNT_FORM={name:a.name,current:String(a.current),monthly:String(a.monthly),target:String(a.target),color:a.color};
  STATE.showFinanceAccountModal=true;
  renderModal();
}
function saveFinanceAccount(){
  const f=FINANCE_ACCOUNT_FORM;
  STATE.finance.accounts=STATE.finance.accounts.map(a=>
    a.id===STATE.editFinanceAccount.id?{...a,current:+f.current||0,monthly:+f.monthly||0,target:+f.target||0}:a
  );
  STATE.showFinanceAccountModal=false;STATE.editFinanceAccount=null;
  saveToFirebase();renderModal();renderPage();
}
function openAddFinanceGoal(){
  STATE.editFinanceGoal=null;
  FINANCE_GOAL_FORM={name:'',target:'',current:''};
  STATE.showFinanceGoalModal=true;renderModal();
}
function openEditFinanceGoal(id){
  const g=STATE.finance.goals.find(x=>x.id===id);
  if(!g)return;
  STATE.editFinanceGoal=g;
  FINANCE_GOAL_FORM={name:g.name,target:String(g.target),current:String(g.current)};
  STATE.showFinanceGoalModal=true;renderModal();
}
function saveFinanceGoal(){
  const f=FINANCE_GOAL_FORM;
  if(!f.name.trim())return;
  const g={id:STATE.editFinanceGoal?STATE.editFinanceGoal.id:Date.now().toString(),name:f.name,target:+f.target||0,current:+f.current||0};
  if(STATE.editFinanceGoal)STATE.finance.goals=STATE.finance.goals.map(x=>x.id===g.id?g:x);
  else STATE.finance.goals=[...STATE.finance.goals,g];
  STATE.showFinanceGoalModal=false;STATE.editFinanceGoal=null;
  saveToFirebase();renderModal();renderPage();
}
function delFinanceGoal(id){STATE.financeDelGoalId=id;renderModal();}
function confirmDelFinanceGoal(){
  STATE.finance.goals=STATE.finance.goals.filter(g=>g.id!==STATE.financeDelGoalId);
  STATE.financeDelGoalId=null;saveToFirebase();renderModal();renderPage();
}
function renderFinanceAccountModal(){
  const a=STATE.editFinanceAccount;
  return `<div>
    <p style="font-size:13px;font-weight:600;color:var(--sub);margin-bottom:16px">編輯「${esc(a.name)}」</p>
    <div class="inp-wrap"><label class="inp-label">目前金額</label><input class="inp" type="number" placeholder="0" value="${FINANCE_ACCOUNT_FORM.current}" oninput="FINANCE_ACCOUNT_FORM.current=this.value"></div>
    <div class="inp-wrap"><label class="inp-label">每月存入</label><input class="inp" type="number" placeholder="0" value="${FINANCE_ACCOUNT_FORM.monthly}" oninput="FINANCE_ACCOUNT_FORM.monthly=this.value"></div>
    <div class="inp-wrap"><label class="inp-label">目標金額</label><input class="inp" type="number" placeholder="0" value="${FINANCE_ACCOUNT_FORM.target}" oninput="FINANCE_ACCOUNT_FORM.target=this.value"></div>
    <div class="flex gap-2 mt-4"><button onclick="saveFinanceAccount()" class="btn btn-primary" style="flex:1">儲存</button><button onclick="closeModal()" class="btn btn-secondary" style="flex:1">取消</button></div>
  </div>`;
}
function renderFinanceGoalModal(){
  return `<div>
    <div class="inp-wrap"><label class="inp-label">目標名稱</label><input class="inp" type="text" placeholder="例如：買包包、旅遊基金" value="${esc(FINANCE_GOAL_FORM.name)}" oninput="FINANCE_GOAL_FORM.name=this.value"></div>
    <div class="inp-wrap"><label class="inp-label">目標金額</label><input class="inp" type="number" placeholder="0" value="${FINANCE_GOAL_FORM.target}" oninput="FINANCE_GOAL_FORM.target=this.value"></div>
    <div class="inp-wrap"><label class="inp-label">目前已存</label><input class="inp" type="number" placeholder="0" value="${FINANCE_GOAL_FORM.current}" oninput="FINANCE_GOAL_FORM.current=this.value"></div>
    <div class="flex gap-2 mt-4"><button onclick="saveFinanceGoal()" class="btn btn-primary" style="flex:1">儲存</button><button onclick="closeModal()" class="btn btn-secondary" style="flex:1">取消</button></div>
  </div>`;
}

let db=null;
let FB_SAVE_TIMER=null;

function initFirebase(){
  try{
    if(typeof firebase==='undefined'){console.log('Firebase 未載入，使用本地模式');return;}
    firebase.initializeApp(FB_CONFIG);
    db=firebase.firestore();
    loadFromFirebase();
    console.log('Firebase 已連線');
  }catch(e){console.log('Firebase 初始化失敗:',e);}
}

async function saveToFirebase(){
  if(!db)return;
  try{
    const data={
      orders:STATE.orders,
      expenses:STATE.expenses,
      customers:STATE.customers,
      finance:STATE.finance,
      goalTarget:STATE.goalTarget,
      savedAt:new Date().toISOString()
    };
    await db.collection('chans').doc('data').set(data);
    console.log('已儲存到雲端');
  }catch(e){console.log('儲存失敗:',e);}
}

function debounceSave(){
  if(FB_SAVE_TIMER)clearTimeout(FB_SAVE_TIMER);
  FB_SAVE_TIMER=setTimeout(saveToFirebase,1500);
}

async function loadFromFirebase(){
  if(!db)return;
  try{
    const doc=await db.collection('chans').doc('data').get();
    if(doc.exists){
      const d=doc.data();
      if(d.orders&&d.orders.length>0)STATE.orders=d.orders.map(calcOrder);
      if(d.expenses)STATE.expenses=d.expenses;
      if(d.customers)STATE.customers=d.customers;
      if(d.finance)STATE.finance=d.finance;
      if(d.goalTarget)STATE.goalTarget=d.goalTarget;
      console.log('已從雲端讀取資料');
      renderPage();
    }
  }catch(e){console.log('讀取失敗:',e);}
}
function setState(k,v){STATE[k]=v;}
function toggleMonthGroup(key,mo){STATE[key][mo]=!STATE[key][mo];renderPage();}
function prevMonth(k){const d=new Date(STATE[k]+'-01');d.setMonth(d.getMonth()-1);STATE[k]=d.toISOString().slice(0,7);renderPage();}
function nextMonth(k){const d=new Date(STATE[k]+'-01');d.setMonth(d.getMonth()+1);STATE[k]=d.toISOString().slice(0,7);renderPage();}
function setMonthlyVm(mo){STATE.monthlyVm=mo;renderPage();}
function onInpChange(id,v){if(id==='dashVd'){STATE.dashVd=v;renderPage();}}
function onSelChange(id,v){if(id==='orderFSrc'){STATE.orderFSrc=v;renderPage();}}

// ── 初始化 ─────────────────────────────────────────────────────
renderNav();
renderPage();

// Firebase 動態載入（需要網路）
(function loadFirebase(){
  const s1=document.createElement('script');
  s1.src='https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js';
  s1.onload=function(){
    const s2=document.createElement('script');
    s2.src='https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js';
    s2.onload=initFirebase;
    s2.onerror=function(){console.log('Firestore 載入失敗，使用本地模式');};
    document.head.appendChild(s2);
  };
  s1.onerror=function(){console.log('Firebase 載入失敗，使用本地模式');};
  document.head.appendChild(s1);
})();
</script>
